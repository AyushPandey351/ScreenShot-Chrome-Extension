<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { font: 13px/1.4 -apple-system, Segoe UI, sans-serif; width: 260px; padding: 10px; }
  button { width: 100%; padding: 8px; margin-bottom: 8px; cursor: pointer; }
  #autoCapture { font-weight: 600; background: #2563eb; color: #fff; border: none; border-radius: 4px; padding: 10px; }
  #status { color: #555; min-height: 16px; }
  p { color: #777; margin: 4px 0 10px; }
  hr { border: none; border-top: 1px solid #eee; margin: 10px 0; }
</style>
</head>
<body>
  <button id="autoCapture">Auto Capture</button>
  <p>Auto-detects whether the page or an inner panel scrolls, smoothly scrolls it to the bottom, then captures the full thing.</p>
  <hr>
  <button id="fullPage">Capture Full Page (manual)</button>
  <button id="pickElement">Pick Scrollable Element&hellip;</button>
  <p>Use these if Auto Capture picks the wrong area.</p>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
